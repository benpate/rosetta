name: Nilaway
permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  GOFLAGS: "-buildvcs=false"

jobs:

  nilaway:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'

    # Pin nilaway to an explicit version (it publishes only pseudo-versions,
    # no semver tags) so the installed tool is predictable, not @latest.
    - name: Install NilAway
      run: go install go.uber.org/nilaway/cmd/nilaway@v0.0.0-20260617211854-01ab7e30fbe0

    # -exclude-test-files scopes analysis to production code; nil flows that
    # exist only in test fixtures (a setter called on a zero-value map variable)
    # are out of scope. The map setters allocate via makeNotNil() before any
    # write and are covered by the -race tests. See mapof/README.md.
    - name: Nil panic checks
      run: nilaway -exclude-test-files=true ./...
