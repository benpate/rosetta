name: Nilaway
permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  GOFLAGS: "-buildvcs=false"

jobs:

  nilaway:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'

    - name: Install NilAway
      run: go install go.uber.org/nilaway/cmd/nilaway@latest

    # RULE: -exclude-test-files suppresses false positives where the only nil flow
    # originates in a test calling a *map setter on a zero-value (nil) map variable.
    # Those setters allocate via makeNotNil() before any write, so the production
    # code is provably nil-safe (covered by the -race tests). See mapof/README.md.
    - name: Nil panic checks
      run: nilaway -exclude-test-files=true ./...
